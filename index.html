<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>drop-a-thot</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Prevent iOS auto-zoom on input/textarea focus without disabling pinch-zoom
      (function() {
        var viewport = document.querySelector('meta[name="viewport"]');
        var original = 'width=device-width, initial-scale=1.0';
        var noZoom = 'width=device-width, initial-scale=1.0, maximum-scale=1.0';
        document.addEventListener('focusin', function(e) {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
            viewport.setAttribute('content', noZoom);
          }
        });
        document.addEventListener('focusout', function(e) {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
            // Delay so focus-switching between inputs doesn't flash; also covers panel close
            setTimeout(function() {
              var a = document.activeElement;
              if (!a || (a.tagName !== 'INPUT' && a.tagName !== 'TEXTAREA' && a.tagName !== 'SELECT')) {
                viewport.setAttribute('content', original);
              }
            }, 150);
          }
        });
        // Also reset on any touch outside an input (catches modal-close scenarios)
        document.addEventListener('touchend', function(e) {
          var t = e.target;
          if (t.tagName !== 'INPUT' && t.tagName !== 'TEXTAREA' && t.tagName !== 'SELECT') {
            setTimeout(function() {
              var a = document.activeElement;
              if (!a || (a.tagName !== 'INPUT' && a.tagName !== 'TEXTAREA' && a.tagName !== 'SELECT')) {
                viewport.setAttribute('content', original);
              }
            }, 200);
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

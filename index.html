<!doctype html>
<html lang="en">
  <head>

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="dropathot" />
    <link rel="apple-touch-icon" href="/icon-180.png" />

    <meta name="description" content="Dropathot — The city, unfiltered." />
    <meta property="og:title" content="dropathot" />
    <meta property="og:description" content="The city, unfiltered." />
    <meta property="og:url" content="https://dropathot.com" />
    <meta property="og:type" content="website" />

    <meta name="twitter:title" content="dropathot" />
    <meta name="twitter:description" content="The city, unfiltered." />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Prevent iOS zoom-on-focus.
      // Problem: some inputs are focused programmatically (autoFocus, .focus() after
      // a button tap) — not by touching the input directly. So we can't just watch
      // touchstart on the input; we must lock on ANY single touch, then restore only
      // after confirming no input ended up focused.
      (function() {
        var vp = document.querySelector('meta[name="viewport"]');
        var base = 'width=device-width, initial-scale=1.0';
        var locked = base + ', maximum-scale=1.0';

        function isInput(el) {
          var t = el && el.tagName;
          return t === 'INPUT' || t === 'TEXTAREA';
        }

        // Lock on any single-finger touch. This covers:
        //   • Direct taps on inputs
        //   • Taps on buttons that open a panel with autoFocus or .focus()
        // Multi-touch (pinch-to-zoom) is excluded so map zoom still works.
        document.addEventListener('touchstart', function(e) {
          if (e.touches.length === 1) vp.setAttribute('content', locked);
        }, { passive: true });

        // Restore 300 ms after touch ends — long enough for programmatic .focus()
        // calls (e.g. setTimeout(..., 100)) to have fired and been detected.
        document.addEventListener('touchend', function() {
          setTimeout(function() {
            if (!isInput(document.activeElement)) vp.setAttribute('content', base);
          }, 300);
        });

        // Also restore when an input explicitly loses focus.
        document.addEventListener('focusout', function(e) {
          if (isInput(e.target)) {
            setTimeout(function() {
              if (!isInput(document.activeElement)) vp.setAttribute('content', base);
            }, 150);
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dropathot</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Prevent iOS zoom-on-focus. Key insight: focusin fires AFTER iOS has already
      // decided to zoom, so we must lock maximum-scale on touchstart instead.
      (function() {
        var vp = document.querySelector('meta[name="viewport"]');
        var base = 'width=device-width, initial-scale=1.0';
        var locked = base + ', maximum-scale=1.0';

        function isInput(el) {
          var t = el && el.tagName;
          return t === 'INPUT' || t === 'TEXTAREA';
        }

        // Lock BEFORE iOS zoom decision (touchstart fires first)
        document.addEventListener('touchstart', function(e) {
          if (isInput(e.target)) vp.setAttribute('content', locked);
        }, { passive: true });

        // Unlock after focus leaves — delay to handle focus-switch between fields
        document.addEventListener('focusout', function(e) {
          if (isInput(e.target)) {
            setTimeout(function() {
              if (!isInput(document.activeElement)) vp.setAttribute('content', base);
            }, 150);
          }
        });

        // Also unlock on touch outside any input (handles drawer-close edge cases)
        document.addEventListener('touchend', function(e) {
          if (!isInput(e.target)) {
            setTimeout(function() {
              if (!isInput(document.activeElement)) vp.setAttribute('content', base);
            }, 200);
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
